<!DOCTYPE html>
<html>

<head>
    <title>LifeLink Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand">LifeLink Admin Panel</span>
        </div>
    </nav>

    <div class="container mt-4">

        <!-- Hospital Approvals -->
        <h3>Pending Hospital Approvals</h3>

        <table class="table table-bordered table-striped mt-3">
            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>City</th>
                    <th>Phone</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="hospitalTable"></tbody>
        </table>

        <!-- Manage Donors -->
        <h3 class="mt-5">Manage Donors</h3>

        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Blood</th>
                    <th>City</th>
                    <th>Phone</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="donorList"></tbody>
        </table>

        <!-- Emergency Requests -->
        <h3 class="mt-5">Emergency Requests</h3>

        <div id="requestList" class="mt-3"></div>

    </div>

    <script>
        const token = localStorage.getItem("token");
        const API = "https://lifelink-backend-j9wo.onrender.com/api";

        // ================= HOSPITALS =================
        async function loadHospitals() {
            const res = await fetch(`${API}/admin/hospitals`);
            const hospitals = await res.json();

            const table = document.getElementById("hospitalTable");
            table.innerHTML = "";

            hospitals.forEach(hospital => {
                const row = document.createElement("tr");

                row.innerHTML = `
                    <td>${hospital.name}</td>
                    <td>${hospital.email}</td>
                    <td>${hospital.city}</td>
                    <td>${hospital.phone}</td>
                    <td>${hospital.status}</td>
                    <td>
                        <button class="btn btn-success btn-sm"
                            onclick="approveHospital('${hospital._id}')">
                            Approve
                        </button>

                        <button class="btn btn-danger btn-sm"
                            onclick="deleteHospital('${hospital._id}')">
                            🗑 Delete
                        </button>
                    </td>
                `;

                table.appendChild(row);
            });
        }

        async function approveHospital(id) {
            await fetch(`${API}/admin/hospital/approve/${id}`, {
                method: "PUT",
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            alert("Hospital Approved");
            loadHospitals();
        }

        async function deleteHospital(id) {
            if (!confirm("Are you sure you want to delete this hospital?")) return;

            try {
                const res = await fetch(`${API}/admin/hospital/delete/${id}`, {
                    method: "DELETE",
                    headers: {
                        "Authorization": "Bearer " + token
                    }
                });

                const data = await res.json();
                alert(data.message);

                loadHospitals();

            } catch (error) {
                console.error(error);
            }
        }

        // ================= DONORS =================
        async function loadDonors() {
            const res = await fetch(`${API}/donor/search?bloodGroup=&city=`);
            const data = await res.json();

            console.log("DONORS DATA:", data);

            const table = document.getElementById("donorList");
            table.innerHTML = "";

            data.donors.forEach(donor => {
                table.innerHTML += `
                    <tr>
                        <td>${donor.name}</td>
                        <td>${donor.bloodGroup}</td>
                        <td>${donor.city}</td>
                        <td>${donor.phone}</td>
                        <td>
                            <button onclick="deleteDonor('${donor._id}')"
                                class="btn btn-danger btn-sm">
                                Delete
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        async function deleteDonor(id) {
            if (!confirm("Delete this donor?")) return;

            const res = await fetch(`${API}/donor/delete/${id}`, {
                method: "DELETE",
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            if (res.ok) {
                alert("Donor deleted");
                loadDonors();
            } else {
                alert("Failed");
            }
        }

        // ================= REQUESTS =================
        async function loadRequests() {
            const res = await fetch(`${API}/request/all`);
            const data = await res.json();

            const container = document.getElementById("requestList");
            container.innerHTML = "";

            data.requests.forEach(r => {
                container.innerHTML += `
                <div class="card p-3 mb-2">

                    <b>${r.hospitalName}</b><br>

                    Blood Group: ${r.bloodGroup}<br>
                    City: ${r.city}<br>
                    Urgency: ${r.urgency}<br>

                    📞 ${r.phone || "Not Provided"}<br><br>

                    <button onclick="deleteRequest('${r._id}')"
                        class="btn btn-danger btn-sm">
                        🗑 Delete
                    </button>

                </div>
                `;
            });
        }

        async function deleteRequest(id) {
            if (!confirm("Are you sure you want to delete this request?")) return;

            try {
                const res = await fetch(`${API}/request/delete/${id}`, {
                    method: "DELETE",
                    headers: {
                        "Authorization": "Bearer " + token
                    }
                });

                const data = await res.json();
                alert(data.message);

                loadRequests();

            } catch (error) {
                console.error(error);
            }
        }

        // ================= INITIAL LOAD =================
        loadHospitals();
        loadDonors();
        loadRequests();
    </script>

</body>

</html>
