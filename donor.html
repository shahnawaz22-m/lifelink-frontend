<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeLink Donor Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .registration-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            padding: 40px;
            margin: 40px auto;
            max-width: 600px;
        }
        
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }
        
        .btn-success {
            background: linear-gradient(45deg, #28a745, #20c997);
            border: none;
            border-radius: 25px;
            padding: 12px 30px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-success:hover {
            background: linear-gradient(45deg, #218838, #1aa085);
            transform: scale(1.05);
        }
        
        .form-control,
        .form-select {
            border-radius: 25px;
            border: 2px solid #e9ecef;
            padding: 12px 20px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        
        .form-control:focus,
        .form-select:focus {
            border-color: #28a745;
            box-shadow: 0 0 0 0.2rem rgba(40, 167, 69, 0.25);
        }
        
        .input-group-text {
            border-radius: 25px 0 0 25px;
            border: 2px solid #e9ecef;
            border-right: none;
            background: #f8f9fa;
        }
        
        .form-floating>.form-control,
        .form-floating>.form-select {
            border-radius: 0 25px 25px 0;
        }
        
        .hero-section {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .hero-section h1 {
            color: #495057;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .hero-section p {
            color: #6c757d;
            font-size: 1.1rem;
        }
        
        .blood-drop-icon {
            font-size: 3rem;
            color: #dc3545;
            margin-bottom: 15px;
        }
        
        .spin {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="registration-container">
            <div class="hero-section">
                <div class="blood-drop-icon">🩸</div>
                <h1>Become a Blood Donor</h1>
                <p>Join our life-saving community and help those in need</p>
            </div>

            <div class="card">
                <div class="card-body p-4">
                    <h4 class="card-title mb-4 text-center">
                        <i class="bi bi-person-plus-fill text-success me-2"></i> Donor Registration Form
                    </h4>

                    <form id="donorForm">
                        <div class="mb-4">
                            <label for="name" class="form-label fw-semibold">
                                <i class="bi bi-person-circle me-2"></i>Full Name
                            </label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                                <input type="text" id="name" class="form-control" placeholder="Enter your full name" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="bloodGroup" class="form-label fw-semibold">
                                <i class="bi bi-droplet-fill text-danger me-2"></i>Blood Group
                            </label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-droplet-fill text-danger"></i></span>
                                <select id="bloodGroup" class="form-select" required>
                                    <option value="">Select your blood group</option>
                                    <option value="A+">A+</option>
                                    <option value="A-">A-</option>
                                    <option value="B+">B+</option>
                                    <option value="B-">B-</option>
                                    <option value="AB+">AB+</option>
                                    <option value="AB-">AB-</option>
                                    <option value="O+">O+</option>
                                    <option value="O-">O-</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="city" class="form-label fw-semibold">
                                <i class="bi bi-geo-alt-fill text-primary me-2"></i>City
                            </label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-geo-alt-fill text-primary"></i></span>
                                <input type="text" id="city" class="form-control" placeholder="Enter your city" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="phone" class="form-label fw-semibold">
                                <i class="bi bi-telephone-fill text-info me-2"></i>Phone Number
                            </label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-telephone-fill text-info"></i></span>
                                <input type="tel" id="phone" class="form-control" placeholder="Enter your phone number" required>
                            </div>
                            <div class="mb-4">
                                <label for="lastDonation" class="form-label fw-semibold">
        <i class="bi bi-calendar-event me-2"></i>Last Donation Date (optional)
    </label>
                                <input type="date" id="lastDonation" class="form-control">
                            </div>
                        </div>

                        <div class="text-center">
                            <button type="submit" id="registerBtn" class="btn btn-success btn-lg">
                                <i class="bi bi-check-circle-fill me-2"></i>
                                Register as Donor
                            </button>
                        </div>
                    </form>

                    <div id="message" class="mt-3"></div>
                </div>
            </div>

            <div class="text-center mt-4">
                <p class="text-muted mb-2">Already registered?</p>
                <a href="index.html" class="btn btn-outline-primary">
                    <i class="bi bi-search me-2"></i>Find Blood Donors
                </a>
            </div>
        </div>
    </div>


    <script>
        const API = "https://lifelink-backend-j9wo.onrender.com/api";
        // Utility function to show messages
        function showMessage(message, type = 'success') {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    <i class="bi bi-${type === 'success' ? 'check-circle' : 'exclamation-triangle'}-fill me-2"></i>
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            // Auto-hide success messages after 5 seconds
            if (type === 'success') {
                setTimeout(() => {
                    messageDiv.innerHTML = '';
                }, 5000);
            }
        }

        // Form validation
        function validateForm(name, bloodGroup, city, phone) {
            if (!name.trim()) {
                showMessage('Please enter your full name', 'danger');
                return false;
            }
            if (!bloodGroup) {
                showMessage('Please select your blood group', 'danger');
                return false;
            }
            if (!city.trim()) {
                showMessage('Please enter your city', 'danger');
                return false;
            }
            if (!phone.trim()) {
                showMessage('Please enter your phone number', 'danger');
                return false;
            }
            // Basic phone validation
            const phoneRegex = /^[\+]?[1-9][\d]{0,15}$/;
            if (!phoneRegex.test(phone.replace(/[\s\-\(\)]/g, ''))) {
                showMessage('Please enter a valid phone number', 'danger');
                return false;
            }
            return true;
        }

        // Register donor function
        async function registerDonor() {
            const name = document.getElementById("name").value.trim();
            const bloodGroup = document.getElementById("bloodGroup").value;
            const city = document.getElementById("city").value.trim();
            const phone = document.getElementById("phone").value.trim();
            const lastDonation = document.getElementById("lastDonation").value;
            const registerBtn = document.getElementById("registerBtn");

            // Validate form
            if (!validateForm(name, bloodGroup, city, phone)) {
                return;
            }

            // Show loading state
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<i class="bi bi-arrow-repeat spin me-2"></i>Registering...';

            try {
                const res = await fetch(`${API}/donor/register`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        name: document.getElementById("name").value,
                        bloodGroup: document.getElementById("bloodGroup").value,
                        city: document.getElementById("city").value,
                        phoneNumber: document.getElementById("phone").value,
                        lastDonationDate: document.getElementById("lastDonation").value
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    showMessage('🎉 Registration successful! Thank you for joining our life-saving community.', 'success');
                    // Clear form
                    document.getElementById("donorForm").reset();
                } else {
                    showMessage(data.message || 'Registration failed. Please try again.', 'danger');
                }
            } catch (error) {
                console.error('Registration error:', error);
                showMessage('Network error. Please check your connection and try again.', 'danger');
            } finally {
                // Reset button state
                registerBtn.disabled = false;
                registerBtn.innerHTML = '<i class="bi bi-check-circle-fill me-2"></i>Register as Donor';
            }
        }

        // Handle form submission
        document.getElementById('donorForm').addEventListener('submit', function(e) {
            e.preventDefault();
            registerDonor();
        });

        // Add input validation feedback
        document.querySelectorAll('input, select').forEach(element => {
            element.addEventListener('blur', function() {
                if (this.value.trim() === '' && this.hasAttribute('required')) {
                    this.classList.add('is-invalid');
                } else {
                    this.classList.remove('is-invalid');
                    this.classList.add('is-valid');
                }
            });

            element.addEventListener('input', function() {
                if (this.classList.contains('is-invalid') && this.value.trim() !== '') {
                    this.classList.remove('is-invalid');
                    this.classList.add('is-valid');
                }
            });
        });
    </script>

</body>

</html>
