<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeLink Hospital Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top, rgba(255, 255, 255, 0.25), transparent 50%), radial-gradient(circle at bottom, rgba(255, 255, 255, 0.15), transparent 55%), linear-gradient(135deg, #2c3e50 0%, #4b6cb7 60%, #4b6cb7 100%);
            background-attachment: fixed;
            color: #1f1f1f;
            overflow-x: hidden;
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.08), transparent 55%), radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.06), transparent 50%), radial-gradient(circle at 60% 80%, rgba(255, 255, 255, 0.05), transparent 45%);
            pointer-events: none;
            z-index: 0;
        }
        
        .dashboard-container {
            position: relative;
            z-index: 1;
            width: min(1100px, 95vw);
            background: rgba(255, 255, 255, 0.92);
            border-radius: 22px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25);
            padding: 40px;
            margin: 40px auto;
            border: 1px solid rgba(255, 255, 255, 0.25);
        }
        
        .card {
            border: none;
            border-radius: 12px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }
        
        .btn-danger {
            background: linear-gradient(45deg, #dc3545, #c82333);
            border: none;
            border-radius: 25px;
            padding: 10px 20px;
            transition: all 0.3s ease;
        }
        
        .btn-danger:hover {
            background: linear-gradient(45deg, #c82333, #a02622);
            transform: scale(1.05);
        }
        
        .form-control {
            border-radius: 25px;
            border: 2px solid #e9ecef;
            padding: 10px 20px;
            transition: border-color 0.3s ease;
        }
        
        .form-control:focus {
            border-color: #dc3545;
            box-shadow: 0 0 0 0.2rem rgba(220, 53, 69, 0.25);
        }
        
        .table {
            border-radius: 12px;
            overflow: hidden;
        }
        
        .table thead th {
            background: linear-gradient(45deg, #dc3545, #c82333);
            color: white;
            border: none;
        }
        
        .stats-card {
            background: linear-gradient(45deg, #28a745, #20c997);
            color: white;
        }
        
        .stats-card h3 {
            font-size: 2.5rem;
            font-weight: bold;
        }
        
        .section-title {
            color: #495057;
            border-bottom: 3px solid #dc3545;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body class="bg-light">
    <div class="container-fluid">
        <div class="dashboard-container">
            <div class="text-center mb-5">
                <h1 class="display-4 text-danger"><i class="bi bi-hospital"></i> LifeLink Hospital Dashboard</h1>
                <p class="lead text-muted">Manage blood donations and emergency requests efficiently</p>
            </div>

            <div class="row mb-4">
                <div class="col-md-3">
                    <div class="card text-center shadow stats-card">
                        <div class="card-body">
                            <i class="bi bi-people-fill fs-1 mb-2"></i>
                            <h5>Total Donors</h5>
                            <h3 id="donorCount" class="mb-0">0</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-9">
                    <div class="card shadow">
                        <div class="card-body">
                            <h5 class="section-title"><i class="bi bi-search"></i> Search Blood Donor</h5>
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-droplet-fill text-danger"></i></span>
                                        <select id="bloodGroup" class="form-select">
                                                <option value="">Select Blood Group</option>
                                                <option value="A+">A+</option>
                                                <option value="A-">A-</option>
                                                <option value="B+">B+</option>
                                                <option value="B-">B-</option>
                                                <option value="AB+">AB+</option>
                                                <option value="AB-">AB-</option>
                                                <option value="O+">O+</option>
                                                <option value="O-">O-</option>
                                            </select>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-geo-alt-fill text-primary"></i></span>
                                        <input type="text" id="city" class="form-control" placeholder="City">
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <button onclick="searchDonor()" class="btn btn-danger w-100">
                                            <i class="bi bi-search"></i> Search Donors
                                        </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-12">
                    <div class="card shadow">
                        <div class="card-body">
                            <h5 class="section-title"><i class="bi bi-exclamation-triangle-fill text-warning"></i> Create Emergency Blood Request</h5>
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-droplet-fill text-danger"></i></span>
                                        <select id="reqBloodGroup" class="form-select">
                                                <option value="">Select Blood Group</option>
                                                <option value="A+">A+</option>
                                                <option value="A-">A-</option>
                                                <option value="B+">B+</option>
                                                <option value="B-">B-</option>
                                                <option value="AB+">AB+</option>
                                                <option value="AB-">AB-</option>
                                                <option value="O+">O+</option>
                                                <option value="O-">O-</option>
                                            </select>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-building text-secondary"></i></span>
                                        <input type="text" id="hospitalName" class="form-control" placeholder="Hospital Name">
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-geo-alt-fill text-primary"></i></span>
                                        <input type="text" id="location" class="form-control" placeholder="City">
                                    </div>
                                </div>
                            </div>
                            <div class="row g-3 mt-2">
                                <div class="col-md-4">
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-shop-window text-secondary"></i></span>
                                        <input type="number" min="1" id="unitsNeeded" class="form-control" placeholder="Units Needed">
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-telephone-fill text-info"></i></span>
                                        <input type="text" id="phone" class="form-control" placeholder="Hospital Phone">
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-lightning-charge-fill text-warning"></i></span>
                                        <select id="urgency" class="form-select">
                                                <option value="Normal">Normal</option>
                                                <option value="High">High</option>
                                                <option value="Critical">Critical</option>
                                            </select>
                                    </div>
                                </div>
                                <div class="col-md-4 d-flex align-items-center justify-content-center">
                                    <button onclick="createRequest()" class="btn btn-danger btn-lg w-100">
                                            <i class="bi bi-plus-circle"></i> Create Emergency Request
                                        </button>
                                </div>
                            </div>
                            <div class="row g-3 mt-2">
                                <div class="col-md-4">
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-person-fill text-info"></i></span>
                                        <input type="text" id="patientName" class="form-control" placeholder="Patient Name">
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-calendar-date text-success"></i></span>
                                        <input type="number" min="1" max="120" id="patientAge" class="form-control" placeholder="Patient Age">
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-heart-pulse-fill text-danger"></i></span>
                                        <input type="text" id="patientCondition" class="form-control" placeholder="Medical Condition">
                                    </div>
                                </div>
                            </div>
                            <div class="mt-3" id="createRequestStatus"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-12">
                    <div class="card shadow">
                        <div class="card-body">
                            <h5 class="section-title"><i class="bi bi-person-check-fill text-success"></i> Available Donors</h5>
                            <div class="table-responsive">
                                <table class="table table-striped table-hover">
                                    <thead>
                                        <tr>
                                            <th><i class="bi bi-person"></i> Name</th>
                                            <th><i class="bi bi-droplet-fill"></i> Blood Group</th>
                                            <th><i class="bi bi-geo-alt"></i> City</th>
                                            <th><i class="bi bi-telephone"></i> Phone</th>
                                            <th>Status</th>
                                            <th><i class="bi bi-whatsapp"></i> Contact</th>

                                        </tr>
                                    </thead>
                                    <tbody id="donorTable">
                                        <tr>
                                            <td colspan="4" class="text-center text-muted">Search for donors to display results here</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script>
        const token = localStorage.getItem("token");

        if (!token) {
            alert("Please login first");
            window.location.href = "hospital-login.html";
        }

        const API = "https://lifelink-backend-j9wo.onrender.com/api"

        function showAlert(message, type = 'success') {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type} alert-dismissible fade show position-fixed`;
            alertDiv.style.cssText = 'top: 20px; right: 20px; z-index: 9999; min-width: 300px;';
            alertDiv.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            document.body.appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 4000);
        }

        async function loadDonorCount() {
            try {
                const res = await fetch(`${API}/donor/count`);
                const data = await res.json();
                document.getElementById("donorCount").innerText = data.count;
            } catch (error) {
                console.error(error);
            }
        }

        async function searchDonor() {
            const blood = document.getElementById("bloodGroup").value.trim();
            const city = document.getElementById("city").value.trim();
            const table = document.getElementById("donorTable");

            table.innerHTML = `<tr><td colspan="6" class="text-center">Searching...</td></tr>`;

            try {
                const res = await fetch(`${API}/donor/search?bloodGroup=${encodeURIComponent(blood)}&city=${encodeURIComponent(city)}`);
                const data = await res.json();
                const donors = data.donors || [];

                table.innerHTML = "";

                if (donors.length === 0) {
                    table.innerHTML = `<tr><td colspan="6" class="text-center">No donors found</td></tr>`;
                    return;
                }

                donors.forEach(donor => {

                    const whatsappLink = "https://wa.me/" + donor.phone;

                    const status = donor.status || "Eligible";

                    const statusBadge = `
                <span class="badge ${
                    status === "Eligible" ? "bg-success" :
                    status === "Recently Donated" ? "bg-warning" :
                    "bg-danger"
                }">
                    ${status}
                </span>
            `;

                    table.innerHTML += `
                <tr>
                    <td>${donor.name}</td>
                    <td><span class="badge bg-danger">${donor.bloodGroup}</span></td>
                    <td>${donor.city}</td>
                    <td>${donor.phone}</td>
                    <td>${statusBadge}</td>
                    <td>
                        <a href="${whatsappLink}" target="_blank" class="btn btn-success btn-sm">
                            WhatsApp
                        </a>
                    </td>
                </tr>
            `;
                });

            } catch (error) {
                console.error(error);
                table.innerHTML = `<tr><td colspan="6" class="text-danger text-center">Error loading donors</td></tr>`;
            }
        }


        async function createRequest() {
            const bloodGroup = document.getElementById("reqBloodGroup").value;
            const hospitalName = document.getElementById("hospitalName").value;
            const city = document.getElementById("location").value;
            const unitsNeeded = document.getElementById("unitsNeeded").value;
            const urgency = document.getElementById("urgency").value;
            const phone = document.getElementById("phone").value;

            try {
                const res = await fetch(`${API}/request/create`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + localStorage.getItem("token")
                    },
                    body: JSON.stringify({
                        bloodGroup,
                        hospitalName,
                        city,
                        unitsNeeded,
                        urgency,
                        phone
                    })
                });

                if (res.ok) {
                    showAlert("Request created successfully");
                } else {
                    showAlert("Failed to create request", "danger");
                }

            } catch (error) {
                console.error(error);
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadDonorCount();
        });
    </script>

</body>

</html>
