<!DOCTYPE html>
<html>

<head>
    <title>Hospital Signup - LifeLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container-fluid vh-100">
        <div class="row h-100">

            <!-- Left Branding -->
            <div class="col-md-6 bg-primary text-white d-flex flex-column justify-content-center align-items-center">

                <h1 class="display-4">LifeLink</h1>
                <p class="lead text-center px-4">
                    Register your hospital and connect with thousands of donors instantly.
                </p>

            </div>

            <!-- Right Form -->
            <div class="col-md-6 d-flex justify-content-center align-items-center">

                <div class="card shadow p-4" style="width:400px">

                    <h3 class="text-center mb-4">Hospital Registration</h3>

                    <form id="signupForm">

                        <input type="text" id="name" class="form-control mb-2" placeholder="Hospital Name" required>

                        <input type="email" id="email" class="form-control mb-2" placeholder="Email" required>

                        <input type="password" id="password" class="form-control mb-2" placeholder="Password" required>

                        <input type="text" id="city" class="form-control mb-2" placeholder="City" required>

                        <input type="text" id="phone" class="form-control mb-3" placeholder="Phone" required>

                        <button class="btn btn-primary w-100">Register</button>

                    </form>

                    <p class="text-center mt-3">
                        Already registered? <a href="hospital-login.html">Login</a>
                    </p>

                </div>

            </div>

        </div>
    </div>

    <script>
        document.getElementById("signupForm").addEventListener("submit", async function(e) {

            e.preventDefault();

            const data = {
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                password: document.getElementById("password").value,
                city: document.getElementById("city").value,
                phone: document.getElementById("phone").value
            };

            const res = await fetch("https://lifelink-backend-j9wo.onrender.com/api/hospital/signup", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            });

            const result = await res.json();
            alert(result.message);

        });
    </script>

</body>

</html>
