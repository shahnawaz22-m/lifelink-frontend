<!DOCTYPE html>
<html>

<head>
    <title>Hospital Login - LifeLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container-fluid vh-100">
        <div class="row h-100">

            <!-- Left Branding -->
            <div class="col-md-6 bg-danger text-white d-flex flex-column justify-content-center align-items-center">

                <h1 class="display-4">LifeLink</h1>
                <p class="lead text-center px-4">
                    Emergency Blood Network connecting hospitals with donors instantly.
                </p>

            </div>

            <!-- Right Form -->
            <div class="col-md-6 d-flex justify-content-center align-items-center">

                <div class="card shadow p-4" style="width:400px">

                    <h3 class="text-center mb-4">Hospital Login</h3>

                    <form id="loginForm">

                        <input type="email" id="email" class="form-control mb-3" placeholder="Email" required>

                        <input type="password" id="password" class="form-control mb-3" placeholder="Password" required>

                        <button class="btn btn-success w-100">Login</button>

                    </form>

                    <p class="text-center mt-3">
                        New hospital? <a href="hospital-signup.html">Register here</a>
                    </p>

                </div>

            </div>

        </div>
    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", async function(e) {

            e.preventDefault();

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const res = await fetch("https://lifelink-backend-j9wo.onrender.com/api/hospital/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    email,
                    password
                })
            });

            const data = await res.json();

            if (res.ok) {
                alert("Login successful");

                localStorage.setItem("token", data.token);

                window.location.href = "hospital.html";
            } else {
                alert(data.message);
            }

        });
    </script>

</body>

</html>
