<!DOCTYPE html>
<html>

<head>
    <title>LifeLink Admin Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-dark text-white">

    <div class="container mt-5" style="max-width:500px">

        <h2 class="text-center mb-4">LifeLink Admin Login</h2>

        <form id="adminLoginForm" class="card p-4 bg-light text-dark">

            <div class="mb-3">
                <label>Email</label>
                <input type="email" id="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>

            <button class="btn btn-primary w-100">Login</button>

        </form>

    </div>

    <script>
        document.getElementById("adminLoginForm").addEventListener("submit", async function(e) {

            e.preventDefault();

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const res = await fetch("https://lifelink-backend-j9wo.onrender.com/api/admin/login", {

                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    email,
                    password
                })

            });

            const data = await res.json();

            if (res.ok) {
                // ✅ SAVE TOKEN
                localStorage.setItem("adminToken", data.token);

                alert("Login successful");

                window.location.href = "admin-dashboard.html";
            } else {
                alert(data.message);
            }

        });
    </script>

</body>

</html>
